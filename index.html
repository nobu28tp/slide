          <button id="btn-add-triangle" class="tool-btn" title="三角形を追加">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 22 2 22"/></svg>
            <span>三角形</span>
          </button>

          <button id="btn-add-image" class="tool-btn" title="画像を追加">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>画像</span>
          </button>
          <input type="file" id="input-add-image" accept="image/*" style="display:none">
        </div>
      </div>

      <!-- History controls -->
      <div class="toolbar-section">
        <span class="section-label">編集</span>
        <div class="btn-group">
          <button id="btn-undo" class="tool-btn compact" title="元に戻す (Ctrl+Z)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
          </button>
          <button id="btn-redo" class="tool-btn compact" title="やり直し (Ctrl+Y)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
          </button>
        </div>
      </div>

      <!-- Project options -->
      <div class="toolbar-section project-controls">
        <button id="btn-new-project" class="tool-btn secondary" title="スライドをすべてクリアして新規作成">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          <span>新規作成</span>
        </button>
        <button id="btn-export-json" class="tool-btn secondary" title="編集データをJSONで保存">
          <span>保存 (JSON)</span>
        </button>
        <button id="btn-import-trigger" class="tool-btn secondary" title="JSONデータを読み込む" onclick="document.getElementById('input-import-json').click()">
          <span>読込 (JSON)</span>
        </button>
        <input type="file" id="input-import-json" accept=".json" style="display:none">
        
        <button id="btn-export-html" class="tool-btn primary glow" title="プレゼン用HTMLをダウンロード">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>HTML出力</span>
        </button>
        <button id="btn-export-pdf" class="tool-btn primary glow" title="スライドをPDFとして印刷・保存">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/><rect x="6" y="2" width="12" height="6"/></svg>
          <span>PDF出力</span>
        </button>
      </div>

      <div class="presentation-trigger">
        <button id="btn-start-presentation" class="action-btn-main">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          <span>スライドショー</span>
        </button>
      </div>
    </header>

    <!-- Workspace Container -->
    <div class="editor-workspace">
      <!-- Left sidebar: Slide Navigator -->
      <aside class="sidebar-left">
        <div class="sidebar-title">
          <h2>スライド</h2>
          <button id="add-slide-btn" class="icon-btn-add" title="スライドを追加">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="slide-list" class="slide-list-scrollbar">
          <!-- Thumbnails loaded by sidebar.js -->
        </div>
      </aside>

      <!-- Center area: Slide Canvas -->
      <main id="canvas-container" class="canvas-viewport">
        <div id="canvas-wrapper">
          <div id="slide-canvas" class="slide-canvas-workspace">
            <!-- Components loaded here -->
          </div>
        </div>
      </main>

      <!-- Right sidebar: Inspector / Properties -->
      <aside id="inspector-panel" class="sidebar-right">
        <!-- 1. Slide general properties (Shown when NO element is selected) -->
        <section id="slide-properties" class="inspector-section">
          <h3>スライド設定</h3>
          
          <div class="prop-group">
            <label for="bg-type">背景の種類</label>
            <select id="bg-type" class="form-select">
              <option value="color">単色</option>
              <option value="gradient">グラデーション</option>
              <option value="image">画像URL</option>
            </select>
          </div>

          <div id="bg-color-group" class="prop-group">
            <label for="bg-color">背景色</label>
            <input type="color" id="bg-color" class="color-picker-input">
          </div>

          <div id="bg-gradient-group" class="prop-group" style="display:none">
            <label for="bg-gradient">グラデーションCSS</label>
            <textarea id="bg-gradient" class="form-textarea" rows="3" placeholder="linear-gradient(135deg, #667eea, #764ba2)"></textarea>
          </div>

          <div id="bg-image-group" class="prop-group" style="display:none">
            <label for="bg-image-url">背景画像URL</label>
            <input type="text" id="bg-image-url" class="form-input" placeholder="https://example.com/bg.jpg">
          </div>
        </section>

        <!-- 2. Selected element properties (Shown when an element is selected) -->
        <section id="element-properties" class="inspector-section" style="display:none">
          <h3>要素のプロパティ</h3>

          <!-- Text properties -->
          <div id="text-properties" class="prop-sub-section">
            <div class="prop-group">
              <label for="text-font-family">フォント</label>
              <select id="text-font-family" class="form-select">
                <option value="Inter, sans-serif">Inter (Sans-serif)</option>
                <option value="'Outfit', sans-serif">Outfit</option>
                <option value="'Times New Roman', serif">Times New Roman (Serif)</option>
                <option value="'Courier New', monospace">Courier New (Monospace)</option>
                <option value="'Hiragino Kaku Gothic ProN', Meiryo, sans-serif">ヒラギノ角ゴ / メイリオ</option>
                <option value="'Hiragino Mincho ProN', 'MS Mincho', serif">ヒラギノ明朝 / MS明朝</option>
              </select>
            </div>

            <div class="prop-row">
              <div class="prop-group width-50">
                <label for="text-font-size">サイズ (px)</label>
                <input type="number" id="text-font-size" class="form-input" min="8" max="200" value="32">
              </div>
              <div class="prop-group width-50">
                <label for="text-color">文字色</label>
                <input type="color" id="text-color" class="color-picker-input">
              </div>
            </div>

            <div class="prop-group">
              <label for="text-bg-color">文字背景色</label>
              <input type="color" id="text-bg-color" class="color-picker-input">
            </div>

            <div class="prop-group">
              <label>装飾</label>
              <div class="btn-toggle-group">
                <button id="btn-text-bold" class="toggle-btn" title="太字"><b>B</b></button>
                <button id="btn-text-italic" class="toggle-btn" title="斜体"><i>I</i></button>
                <button id="btn-text-underline" class="toggle-btn" title="下線"><u>U</u></button>
              </div>
            </div>

            <div class="prop-group">
              <label>配置</label>
              <div class="btn-toggle-group flex-4">
                <button id="btn-text-align-left" class="toggle-btn" title="左揃え">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
                </button>
                <button id="btn-text-align-center" class="toggle-btn" title="中央揃え">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="18" y1="18" x2="6" y2="18"/></svg>
                </button>
                <button id="btn-text-align-right" class="toggle-btn" title="右揃え">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
                </button>
                <button id="btn-text-align-justify" class="toggle-btn" title="両端揃え">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Shape properties -->
          <div id="shape-properties" class="prop-sub-section" style="display:none">
            <div class="prop-group">
              <label for="shape-fill">塗りつぶし色</label>
              <input type="color" id="shape-fill" class="color-picker-input">
            </div>

            <div class="prop-row">
              <div class="prop-group width-50">
                <label for="shape-border-width">枠線の太さ</label>
                <input type="number" id="shape-border-width" class="form-input" min="0" max="30" value="2">
              </div>
              <div class="prop-group width-50">
                <label for="shape-border-color">枠線の色</label>
                <input type="color" id="shape-border-color" class="color-picker-input">
              </div>
            </div>

            <div class="prop-group">
              <label for="shape-border-style">枠線の種類</label>
              <select id="shape-border-style" class="form-select">
                <option value="none">なし</option>
                <option value="solid">実線</option>
                <option value="dashed">破線</option>
                <option value="dotted">点線</option>
              </select>
            </div>

            <div class="prop-group">
              <label for="shape-radius">角の丸み (px)</label>
              <input type="range" id="shape-radius" class="form-range" min="0" max="150" value="8">
            </div>
          </div>

          <!-- Image properties -->
          <div id="image-properties" class="prop-sub-section" style="display:none">
            <div class="prop-group">
              <label for="image-url">画像URL</label>
              <input type="text" id="image-url" class="form-input" placeholder="https://example.com/image.jpg">
            </div>
            
            <div class="prop-group">
              <label for="image-radius">角の丸み (px)</label>
              <input type="range" id="image-radius" class="form-range" min="0" max="150" value="8">
            </div>
          </div>

          <!-- Layer actions / Delete -->
          <div class="element-actions-section">
            <div class="prop-group">
              <label>レイヤー重ね順</label>
              <div class="btn-row">
                <button id="btn-layer-front" class="action-btn secondary width-50">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                  <span>最前面へ</span>
                </button>
                <button id="btn-layer-back" class="action-btn secondary width-50">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/></svg>
                  <span>最背面へ</span>
                </button>
              </div>
            </div>

            <button id="btn-delete-element" class="action-btn danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              <span>要素を削除</span>
            </button>
          </div>
        </section>
      </aside>
    </div>

    <!-- Presentation Overlay (Mode: Fullscreen inside client) -->
    <div id="presentation-overlay" style="display:none">
      <div id="presentation-viewport">
        <!-- Renders the slides and transitions -->
      </div>
      <div id="presentation-controls">
        <button id="pres-btn-prev" class="pres-control-btn">&larr;</button>
        <div id="pres-progress-container"><div id="pres-progress-bar"></div></div>
        <button id="pres-btn-next" class="pres-control-btn">&rarr;</button>
        <button id="pres-btn-exit" class="pres-control-btn red">終了</button>
        <div id="pres-counter"></div>
      </div>
    </div>
  </div>

  <!-- Hidden container for printing PDF -->
  <div id="print-container" style="display:none"></div>

  <!-- App bootstrap -->
</body>
</html>
